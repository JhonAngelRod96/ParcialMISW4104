<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

</head>
<body class="font-body-md antialiased overflow-x-hidden min-h-screen">

<main *ngIf="repositorio" class="pt-24 pb-12 px-6 max-w-5xl mx-auto">

  <!-- Botón volver -->
  <div class="mb-8 flex items-center">
    <button
      (click)="volver()"
      class="flex items-center gap-2 text-slate-400 hover:text-white transition-all group"
    >
      <span class="material-symbols-outlined text-[18px]">arrow_back</span>
      <span class="text-sm uppercase tracking-wider">Volver</span>
    </button>
  </div>

  <section class="mb-12 flex flex-col items-center text-center">

    <div class="mb-4 inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-900 border border-[#334155]">
      <span class="material-symbols-outlined text-blue-500 text-sm">folder_open</span>
      <span class="text-slate-400 text-sm">ID: {{ repositorio.id }}</span>
    </div>

    <div class="flex items-center gap-4 mb-4">
      <div class="bg-black/30 p-3 rounded-full">
        <img
          [src]="getLogo(repositorio.language)"
          class="w-12 h-12 object-contain"
        />
      </div>

      <h1 class="text-4xl font-black text-white uppercase tracking-tight">
        {{ repositorio.name }}
      </h1>
    </div>

    <p class="text-slate-400 max-w-2xl">
      {{ repositorio.description }}
    </p>

  </section>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <div class="bg-[#1e293b] border border-[#334155] p-6 rounded-lg flex flex-col gap-3">

      <div class="flex items-center justify-between text-slate-500">
        <span class="text-xs uppercase tracking-wider">Lenguaje</span>
        <span class="material-symbols-outlined text-blue-400">code</span>
      </div>

      <div class="flex items-center gap-3">
        <img
          [src]="getLogo(repositorio.language)"
          class="w-6 h-6 object-contain"
        />
        <span class="text-2xl font-bold text-white">
          {{ repositorio.language }}
        </span>
      </div>

    </div>

    <div class="bg-[#1e293b] border border-[#334155] p-6 rounded-lg flex flex-col gap-3">

      <div class="flex items-center justify-between text-slate-500">
        <span class="text-xs uppercase tracking-wider">Stars</span>
        <span class="material-symbols-outlined text-yellow-400">star</span>
      </div>

      <div class="text-2xl font-bold text-white">
        ⭐ {{ repositorio.stars }}
      </div>

    </div>

    <div class="bg-[#1e293b] border border-[#334155] p-6 rounded-lg flex flex-col gap-3">

      <div class="flex items-center justify-between text-slate-500">
        <span class="text-xs uppercase tracking-wider">Creación</span>
        <span class="material-symbols-outlined text-slate-400">calendar_today</span>
      </div>

      <div class="text-2xl font-bold text-white">
        {{ repositorio.createdAt }}
      </div>

      <span class="text-sm text-slate-400">
        Owner ID: {{ repositorio.ownerId }}
      </span>

    </div>

  </div>

</main>
</body></html>
