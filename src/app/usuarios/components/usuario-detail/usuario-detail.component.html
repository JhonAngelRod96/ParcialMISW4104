<div *ngIf="usuario" class="fixed right-0 top-0 h-full w-96 bg-surface p-6 text-white shadow-lg z-50">

  <h2 class="text-2xl font-bold text-primary mb-4">
    {{ usuario.name }}
  </h2>

  <img 
    [src]="usuario.avatarUrl"
    class="w-24 h-24 rounded-full mb-4"
  />

  <p><strong>Email:</strong> {{ usuario.email }}</p>
  <p><strong>Rol:</strong> {{ usuario.role }}</p>
  <p><strong>Nombre:</strong> {{ usuario.name }}</p>
  <p><strong>UserName:</strong> {{ usuario.username }}</p>
  <p><strong>Ubicación:</strong> {{ usuario.location }}</p>
  <p><strong>Cantidad de Repositorios:</strong> {{ usuario.repoIds.length }}</p>

</div>
